<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Social Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero card">
      <img class="avatar" src="https://placehold.co/300x300/png" alt="Profile picture" />
      <div>
        <h1>Your Name / Username</h1>
        <p>Short intro goes here.</p>
        <div class="chip-row">
          <span class="chip">Pronouns: she/they</span>
          <span class="chip">Location: your place</span>
          <span class="chip">Interest: art, games, tech</span>
        </div>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab-button active" data-tab="about">About</button>
      <button class="tab-button" data-tab="socials">Socials</button>
      <button class="tab-button" data-tab="gallery">Pics & Art</button>
      <button class="tab-button" data-tab="extras">Extras</button>
    </nav>

      <section id="about" class="tab-panel active">
      <div class="grid two">
        <article class="card">
          <h2>Bio</h2>
          <p class="muted">Write your bio here.</p>
        </article>
        <article class="card">
          <h2>Info</h2>
          <div class="info-list">
            <div class="info-row"><strong>Name</strong><span>...</span></div>
            <div class="info-row"><strong>Pronouns</strong><span>...</span></div>
            <div class="info-row"><strong>Interests</strong><span>...</span></div>
          </div>
        </article>
      </div>
    </section> 

    <section id="socials" class="tab-panel">
      <article class="card">
        <h2>Socials</h2>
        <div class="social-list">
          <div class="social-item">
            <div><strong>Instagram</strong><span>@youraccount</span></div>
            <a class="social-link" href="#">Open</a>
          </div>
        </div>
      </article>
    </section>

    <section id="gallery" class="tab-panel">
      <article class="card">
        <h2>Gallery</h2>
        <div class="gallery-grid">
          <div class="gallery-card">
            <img src="https://placehold.co/800x600/png" />
            <div class="gallery-copy">
              <h3>Title</h3>
              <p>Description</p>
            </div>
          </div>
        </div>
      </article>
    </section>
        
    <section id="extras" class="tab-panel">
      <article class="card">
        <h2>Extras</h2>
        <p class="muted">Anything else</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
