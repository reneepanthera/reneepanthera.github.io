<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer Log</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .map-page {
      width: min(calc(100% - 2rem), 1200px);
      margin: 0 auto;
      padding: 1.25rem 0 3rem;
    }

    .map-header {
      margin: 1rem 0 1.2rem;
    }

    .map-header h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    .map-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 65ch;
    }

    .map-layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 1rem;
    }

    .map-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    #map {
      width: 100%;
      height: 70vh;
      min-height: 460px;
      border-radius: 20px;
      overflow: hidden;
    }

    .spot-list {
      display: grid;
      gap: 0.85rem;
      max-height: 70vh;
      overflow: auto;
      padding-right: 0.2rem;
    }

    .spot-item {
      padding: 1rem;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .spot-item:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
    }

    .spot-item h3 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      color: var(--accent-2);
    }

    .spot-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .top-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .top-links a {
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(179, 136, 255, 0.22), rgba(212, 184, 255, 0.12));
      border: 1px solid rgba(212, 184, 255, 0.22);
      color: var(--accent-2);
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 900px) {
      .map-layout {
        grid-template-columns: 1fr;
      }

      #map,
      .spot-list {
        max-height: none;
      }

      #map {
        height: 52vh;
      }
    }
  </style>
</head>
<body>
  <main class="map-page">
    <div class="top-links">
      <a href="index.html">← Back Home</a>
    </div>

    <section class="map-header card">
      <h1>Explorer Log</h1>
      <p>
        A map of places I’ve explored, photographed, or want to remember.
        Click a pin or a spot card to view notes and descriptions.
      </p>
    </section>

    <section class="map-layout">
      <div class="map-card">
        <div id="map"></div>
      </div>

      <aside class="map-card">
        <h2>Spots</h2>
        <div id="spot-list" class="spot-list"></div>
      </aside>
    </section>
  </main>

  <script>
    const spots = [
      {
        title: "Old Mill Site",
        position: { lat: 45.5231, lng: -122.6765 },
        description: "Cool industrial spot with a lot of texture for photos. Great during overcast weather."
      },
      {
        title: "Abandoned School",
        position: { lat: 45.5152, lng: -122.6784 },
        description: "Broken windows, faded hallways, and a lot of eerie details. Bring a flashlight."
      },
      {
        title: "Warehouse Roof View",
        position: { lat: 45.5310, lng: -122.6690 },
        description: "One of my favorite skyline views. Best around sunset."
      }
    ];

    let map;
    let infoWindow;

    async function initMap() {
      const { Map } = await google.maps.importLibrary("maps");
      const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

      map = new Map(document.getElementById("map"), {
        center: { lat: 45.5231, lng: -122.6765 },
        zoom: 12,
        mapId: "DEMO_MAP_ID"
      });

      infoWindow = new google.maps.InfoWindow();

      const bounds = new google.maps.LatLngBounds();
      const spotList = document.getElementById("spot-list");

      spots.forEach((spot) => {
        const marker = new AdvancedMarkerElement({
          map,
          position: spot.position,
          title: spot.title
        });

        bounds.extend(spot.position);

        const openInfo = () => {
          infoWindow.setContent(`
            <div style="max-width: 220px; color: #111;">
              <h3 style="margin:0 0 8px;">${spot.title}</h3>
              <p style="margin:0; line-height:1.5;">${spot.description}</p>
            </div>
          `);
          infoWindow.open({
            anchor: marker,
            map
          });
          map.panTo(spot.position);
        };

        marker.addListener("click", openInfo);

        const item = document.createElement("div");
        item.className = "spot-item";
        item.innerHTML = `
          <h3>${spot.title}</h3>
          <p>${spot.description}</p>
        `;
        item.addEventListener("click", openInfo);

        spotList.appendChild(item);
      });

      map.fitBounds(bounds);
    }

    window.initMap = initMap;
  </script>

  <!-- Replace YOUR_API_KEY with your real Google Maps API key -->
  <script
    async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap&loading=async">
  </script>
</body>
</html>
